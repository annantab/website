 <style>
    /*the word button is called a CSS selector it tells a computer 
    which elements we're targeting with our css code in our case we are 
    targeting all buttons on the page and we are changing the background color of 
    all buttons on the page to be red*/
    button { 
        background-color: red; /*background-color is known as a CSS property it tells a computer what we are changing*/
    }
    /*CSS value which tells the computer what we are changing the property to*/
 </style>
 <button>SUBSCRIBE</button>
